openapi: 3.0.0
info:
  title: Federation API
  version: 1.1.0
  description: |
    API de gestion d'une fédération agricole nationale.

  contact:
    name: Fédération Agricole
    email: contact@federation-agricole.mg
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8080/api/v1
    description: Serveur de développement
  - url: https://api.federation-agricole.mg/v1
    description: Serveur de production

tags:
  - name: Collectivités
    description: Gestion des collectivités
  - name: Membres
    description: Gestion des membres
  - name: Paiements
    description: Gestion des paiements et cotisations
  - name: Comptes
    description: Gestion des comptes financiers
  - name: Activités
    description: Gestion des activités
  - name: Présences
    description: Gestion des présences aux activités
  - name: Statistiques
    description: Calcul des statistiques (collectivité et membre)
  - name: Statistiques Fédérales
    description: Statistiques globales de la fédération

paths:
  # ========== COLLECTIVITÉS ==========
  /collectivities:
    post:
      tags:
        - Collectivités
      summary: Créer une collectivité
      description: |
        Conditions requises :
        - Minimum 10 membres fondateurs
        - Ancienneté ≥ 6 mois pour chaque fondateur
        - Postes obligatoires remplis (Président, Trésorier, Secrétaire)
      operationId: createCollectivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectivityRequest'
      responses:
        '201':
          description: Collectivité créée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectivityResponse'
        '400':
          description: Données invalides ou conditions non remplies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Collectivités
      summary: Lister toutes les collectivités
      operationId: findAllCollectivities
      parameters:
        - name: status
          in: query
          description: Filtrer par statut
          schema:
            type: string
            enum: [PENDING, ACTIVE, SUSPENDED]
        - name: city
          in: query
          description: Filtrer par ville
          schema:
            type: string
      responses:
        '200':
          description: Liste des collectivités
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CollectivityResponse'

  /collectivities/{id}:
    get:
      tags:
        - Collectivités
      summary: Obtenir une collectivité par son ID
      description: |
        Retourne la collectivité avec l'ensemble de ses informations,
        incluant la liste complète des membres inscrits (attribut `members`).
      operationId: findCollectivityById
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la collectivité
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Collectivité trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectivityDetailResponse'
        '404':
          description: Collectivité non trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /collectivities/{id}/validate:
    post:
      tags:
        - Collectivités
      summary: Valider une collectivité par la fédération
      operationId: validateCollectivity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Collectivité validée avec succès
        '404':
          description: Collectivité non trouvée

  /collectivities/{id}/assign-identity:
    patch:
      tags:
        - Collectivités
      summary: Attribuer un numéro et un nom unique à une collectivité (fonctionnalité J)
      description: |
        La fédération attribue manuellement un numéro et un nom uniques à une collectivité existante.
        Ces champs sont immuables une fois attribués. Une erreur 400 est retournée si on tente de les modifier.
      operationId: assignCollectivityIdentity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignIdentityRequest'
      responses:
        '200':
          description: Numéro et nom attribués avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectivityResponse'
        '400':
          description: Données invalides ou déjà attribuées
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Collectivité non trouvée

  /collectivities/{id}/financialAccounts:
    get:
      tags:
        - Comptes
      summary: Obtenir les comptes financiers d'une collectivité
      description: |
        Retourne la liste des comptes (caisse, mobile money, banque) associés à la
        collectivité, avec leur solde calculé à la date fournie via le paramètre `at`.
        Si `at` est absent, le solde est calculé à la date courante.
      operationId: getCollectivityFinancialAccounts
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la collectivité
          schema:
            type: string
            format: uuid
        - name: at
          in: query
          required: false
          description: >
            Date à laquelle calculer le solde de chaque compte (format ISO 8601 : YYYY-MM-DD).
            Si absente, utilise la date du jour.
          schema:
            type: string
            format: date
            example: "2024-06-30"
      responses:
        '200':
          description: Liste des comptes avec solde à la date demandée
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FinancialAccountSnapshot'
        '404':
          description: Collectivité non trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ========== MEMBRES ==========
  /members:
    post:
      tags:
        - Membres
      summary: Créer un membre (candidat)
      operationId: createMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberRequest'
      responses:
        '201':
          description: Membre créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'
        '400':
          description: Données invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /members/{id}/join:
    post:
      tags:
        - Membres
      summary: Faire adhérer un membre (validation des conditions B-2)
      description: |
        Nouvelles conditions (21/04/2026) :
        - Être parrainé par au moins deux membres confirmés (≥ 90 jours d'ancienneté et actifs)
        - Le nombre de parrains issus de la collectivité cible doit être ≥ au nombre de parrains d'autres collectivités
        - Paiement des frais d'adhésion (50 000 MGA) + cotisation annuelle de la collectivité
        - Informations personnelles complètes
      operationId: joinMember
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Adhésion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'
        '400':
          description: Conditions non remplies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /members/{id}/transfer:
    post:
      tags:
        - Membres
      summary: Transférer un membre vers une autre collectivité
      operationId: transferMember
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - collectivityId
              properties:
                collectivityId:
                  type: string
                  format: uuid
                  description: ID de la nouvelle collectivité
      responses:
        '200':
          description: Transfert réussi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'
        '400':
          description: Erreur lors du transfert

  /members/{id}/leave:
    post:
      tags:
        - Membres
      summary: Faire quitter un membre
      operationId: leaveMember
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Départ enregistré
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'

  # ========== PAIEMENTS ==========
  /payments:
    post:
      tags:
        - Paiements
      summary: Enregistrer un paiement
      operationId: createPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        '201':
          description: Paiement enregistré
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'

    get:
      tags:
        - Paiements
      summary: Lister tous les paiements
      operationId: findAllPayments
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [MONTHLY, ANNUAL, EXCEPTIONAL]
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Liste des paiements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentResponse'

  /members/{memberId}/payments:
    get:
      tags:
        - Paiements
      summary: Paiements d'un membre
      operationId: findPaymentsByMember
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Liste des paiements du membre
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentResponse'

  # ========== COMPTES ==========
  /accounts:
    post:
      tags:
        - Comptes
      summary: Créer un compte
      description: |
        Types disponibles : CASH, BANK, MOBILE_MONEY
        Une seule caisse (CASH) autorisée par collectivité.
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountRequest'
      responses:
        '201':
          description: Compte créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '400':
          description: "Erreur (ex: caisse déjà existante)"

    get:
      tags:
        - Comptes
      summary: Lister tous les comptes
      operationId: findAllAccounts
      responses:
        '200':
          description: Liste des comptes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountResponse'

  /accounts/{id}:
    get:
      tags:
        - Comptes
      summary: Obtenir un compte par son ID
      operationId: findAccountById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Compte trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '404':
          description: Compte non trouvé

  # ========== ACTIVITÉS ==========
  /activities:
    post:
      tags:
        - Activités
      summary: Créer une activité
      description: "Types disponibles : MANDATORY, EXCEPTIONAL"
      operationId: createActivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityRequest'
      responses:
        '201':
          description: Activité créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityResponse'

    get:
      tags:
        - Activités
      summary: Lister toutes les activités
      operationId: findAllActivities
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [MANDATORY, EXCEPTIONAL]
      responses:
        '200':
          description: Liste des activités
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActivityResponse'

  # ========== PRÉSENCES ==========
  /attendances:
    post:
      tags:
        - Présences
      summary: Enregistrer une présence
      operationId: createAttendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceRequest'
      responses:
        '201':
          description: Présence enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceResponse'

  /activities/{activityId}/attendances:
    get:
      tags:
        - Présences
      summary: Présences d'une activité
      operationId: findAttendancesByActivity
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Liste des présences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AttendanceResponse'

  # ========== STATISTIQUES COLLECTIVITÉS & MEMBRES ==========
  /statistics/collectivities/{id}:
    get:
      tags:
        - Statistiques
      summary: Statistiques d'une collectivité
      operationId: getCollectivityStats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Statistiques de la collectivité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectivityStats'

  /statistics/members/{id}:
    get:
      tags:
        - Statistiques
      summary: Statistiques d'un membre
      operationId: getMemberStats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Statistiques du membre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberStats'

  # ========== STATISTIQUES FÉDÉRALES ==========
  /statistics/federation/attendance-rate:
    get:
      tags:
        - Statistiques Fédérales
      summary: Taux d'assiduité global par collectivité sur une période donnée
      operationId: getFederationAttendanceRate
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Date de début (format YYYY-MM-DD)
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Date de fin (format YYYY-MM-DD)
      responses:
        '200':
          description: Taux d'assiduité par collectivité
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CollectivityAttendanceRate'

  /statistics/federation/up-to-date-members:
    get:
      tags:
        - Statistiques Fédérales
      summary: Pourcentage de membres à jour de cotisation par collectivité
      operationId: getUpToDateMembersPercentage
      parameters:
        - name: referenceDate
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Date de référence pour vérifier les cotisations à jour
      responses:
        '200':
          description: Pourcentage de membres à jour par collectivité
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CollectivityPaymentStatus'

  /statistics/federation/new-members:
    get:
      tags:
        - Statistiques Fédérales
      summary: Nombre de nouveaux adhérents par collectivité sur une période donnée
      operationId: getNewMembersCount
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Nombre de nouveaux adhérents par collectivité
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CollectivityNewMembers'

components:
  schemas:
    # ========== ENUMS ==========
    CollectivityStatus:
      type: string
      enum: [PENDING, ACTIVE, SUSPENDED]

    MemberStatus:
      type: string
      enum: [ACTIVE, INACTIVE, SUSPENDED]

    PaymentType:
      type: string
      enum: [MONTHLY, ANNUAL, EXCEPTIONAL]

    AccountType:
      type: string
      enum: [CASH, BANK, MOBILE_MONEY]

    ActivityType:
      type: string
      enum: [MANDATORY, EXCEPTIONAL]

    SponsorshipRelationType:
      type: string
      enum: [FAMILY, FRIEND, COLLEAGUE, NEIGHBOR, OTHER]

    # ========== REQUESTS ==========
    AssignIdentityRequest:
      type: object
      required:
        - number
        - name
      properties:
        number:
          type: string
          pattern: '^[A-Z0-9-]+$'
          example: "COL-2026-001"
        name:
          type: string
          example: "Collectivité des Riziculteurs d'Analamanga"

    CollectivityRequest:
      type: object
      required:
        - name
        - city
        - creationDate
        - foundingMembers
        - mandates
      properties:
        name:
          type: string
          maxLength: 100
        city:
          type: string
          maxLength: 100
        specialty:
          type: string
          maxLength: 100
        creationDate:
          type: string
          format: date
        annualFeeAmount:
          type: number
          minimum: 0
          description: "Cotisation annuelle obligatoire pour la collectivité (en MGA)"
        foundingMembers:
          type: array
          minItems: 10
          items:
            type: object
            required:
              - memberId
            properties:
              memberId:
                type: string
                format: uuid
        mandates:
          type: array
          items:
            type: object
            required:
              - memberId
              - roleId
            properties:
              memberId:
                type: string
                format: uuid
              roleId:
                type: string
                format: uuid

    SponsorRequest:
      type: object
      required:
        - sponsorId
        - relationType
      properties:
        sponsorId:
          type: string
          format: uuid
        relationType:
          $ref: '#/components/schemas/SponsorshipRelationType'
        relationDetails:
          type: string
          maxLength: 100
          description: "Précisions sur la relation (ex: cousin, ami d'enfance, etc.)"

    MemberRequest:
      type: object
      required:
        - firstName
        - lastName
        - birthDate
        - phone
        - address
        - sponsors
      properties:
        firstName:
          type: string
          maxLength: 50
        lastName:
          type: string
          maxLength: 50
        birthDate:
          type: string
          format: date
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: '^[0-9+\- ]{10,20}$'
        address:
          type: string
        collectivityId:
          type: string
          format: uuid
        sponsors:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/SponsorRequest'

    PaymentRequest:
      type: object
      required:
        - memberId
        - accountId
        - amount
        - type
        - paymentDate
      properties:
        memberId:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        amount:
          type: number
          minimum: 0.01
        type:
          $ref: '#/components/schemas/PaymentType'
        paymentDate:
          type: string
          format: date
        reference:
          type: string
          maxLength: 50
        description:
          type: string

    AccountRequest:
      type: object
      required:
        - name
        - type
        - collectivityId
      properties:
        name:
          type: string
          maxLength: 100
        type:
          $ref: '#/components/schemas/AccountType'
        collectivityId:
          type: string
          format: uuid

    ActivityRequest:
      type: object
      required:
        - title
        - activityDate
        - type
        - collectivityId
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
        activityDate:
          type: string
          format: date-time
        type:
          $ref: '#/components/schemas/ActivityType'
        collectivityId:
          type: string
          format: uuid

    AttendanceRequest:
      type: object
      required:
        - activityId
        - memberId
        - present
      properties:
        activityId:
          type: string
          format: uuid
        memberId:
          type: string
          format: uuid
        present:
          type: boolean
        justification:
          type: string

    # ========== RESPONSES ==========
    CollectivityResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        number:
          type: string
        name:
          type: string
        city:
          type: string
        specialty:
          type: string
        creationDate:
          type: string
          format: date
        annualFeeAmount:
          type: number
        validatedByFederation:
          type: boolean
        status:
          $ref: '#/components/schemas/CollectivityStatus'
        memberCount:
          type: integer
        activeMandatesCount:
          type: integer

    CollectivityDetailResponse:
      type: object
      description: Représentation complète d'une collectivité, incluant la liste de ses membres.
      properties:
        id:
          type: string
          format: uuid
        number:
          type: string
        name:
          type: string
        city:
          type: string
        specialty:
          type: string
        creationDate:
          type: string
          format: date
        annualFeeAmount:
          type: number
        validatedByFederation:
          type: boolean
        status:
          $ref: '#/components/schemas/CollectivityStatus'
        memberCount:
          type: integer
        activeMandatesCount:
          type: integer
        members:
          type: array
          description: Liste des membres inscrits auprès de la collectivité
          items:
            $ref: '#/components/schemas/MemberResponse'

    FinancialAccountSnapshot:
      type: object
      description: Solde d'un compte à une date donnée.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Caisse Principale"
        type:
          $ref: '#/components/schemas/AccountType'
        balanceAt:
          type: number
          description: Solde calculé à la date `at` fournie en paramètre
          example: 1250000.00
        snapshotDate:
          type: string
          format: date
          description: Date effective du calcul du solde
          example: "2024-06-30"
        isActive:
          type: boolean
        collectivityId:
          type: string
          format: uuid

    MemberResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        fullName:
          type: string
        birthDate:
          type: string
          format: date
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        joinDate:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/MemberStatus'
        seniorityDays:
          type: integer
        collectivityId:
          type: string
          format: uuid
        collectivityName:
          type: string
        sponsors:
          type: array
          items:
            $ref: '#/components/schemas/SponsorResponse'

    SponsorResponse:
      type: object
      properties:
        sponsorId:
          type: string
          format: uuid
        sponsorName:
          type: string
        relationType:
